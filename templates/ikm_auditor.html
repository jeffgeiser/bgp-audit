<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenBrain | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="auditorApp()">

    <!-- Persona Picker (shown when no persona selected) -->
    <div x-show="!currentPersona" x-cloak class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-2xl w-full">
            <div class="text-center mb-8">
                <div class="w-14 h-14 rounded-2xl bg-[#00205B] flex items-center justify-center mx-auto mb-4">
                    <svg class="w-7 h-7 text-[#00A9E0]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-[#00205B]">ZenBrain Dashboard</h1>
                <p class="text-sm text-slate-500 mt-1">Select your profile to continue</p>
            </div>

            <div class="grid grid-cols-2 gap-3" x-show="personas.length > 0">
                <template x-for="p in personas" :key="p.id">
                    <button @click="selectPersona(p)"
                        class="flex items-center gap-3 p-4 bg-white rounded-xl border border-slate-200 hover:border-[#00A9E0] hover:shadow-md transition-all text-left group">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
                             :class="p.role === 'Admin' ? 'bg-violet-100 text-violet-600' : 'bg-[#00A9E0]/10 text-[#00A9E0]'">
                            <span class="text-sm font-bold" x-text="p.name.charAt(0).toUpperCase()"></span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-slate-800 group-hover:text-[#00205B]" x-text="p.name"></p>
                            <p class="text-[10px] text-slate-400 uppercase tracking-wider" x-text="p.role"></p>
                            <p class="text-[10px] text-slate-400 truncate mt-0.5" x-text="p.departments.join(', ')"></p>
                        </div>
                    </button>
                </template>
            </div>

            <!-- Manage personas link -->
            <div class="text-center mt-6">
                <button @click="showManagePersonas = true" class="text-xs text-[#00A9E0] hover:underline font-medium">Manage Personas</button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard (shown after persona selected) -->
    <div x-show="currentPersona" x-cloak>
        <!-- Header -->
        <header class="bg-[#00205B] text-white shadow-lg sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-amber-500 flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight">ZenBrain Dashboard</h1>
                        <p class="text-[10px] text-white/50 uppercase tracking-widest">Knowledge Review &amp; Approval</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <!-- Current persona -->
                    <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white/10 border border-white/10">
                        <div class="w-6 h-6 rounded-md bg-white/20 flex items-center justify-center">
                            <span class="text-[10px] font-bold" x-text="currentPersona?.name?.charAt(0)?.toUpperCase()"></span>
                        </div>
                        <span class="text-xs font-medium" x-text="currentPersona?.name"></span>
                        <button @click="switchPersona()" class="text-white/40 hover:text-white ml-1" title="Switch persona">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
                        </button>
                    </div>
                    <a href="/zenbrain/" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-white/10 hover:bg-white/20 transition-all border border-white/10">Chat</a>
                    <button @click="showManagePersonas = true" x-show="currentPersona?.role === 'Admin'"
                        class="px-3 py-1.5 rounded-lg text-xs font-bold bg-white/10 hover:bg-white/20 transition-all border border-white/10">Manage Personas</button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 py-6">
            <!-- Filters + Stats -->
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 mb-6 flex flex-wrap items-center gap-4">
                <div class="flex items-center gap-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Status</label>
                    <select x-model="filterStatus" @change="loadChunks()"
                        class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-[#00A9E0] outline-none">
                        <option value="Pending">Pending</option>
                        <option value="Approved">Approved</option>
                        <option value="Rejected">Rejected</option>
                        <option value="">All</option>
                    </select>
                </div>
                <div class="flex items-center gap-2" x-show="currentPersona?.role === 'Admin'">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Department</label>
                    <select x-model="filterDept" @change="loadChunks()"
                        class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-[#00A9E0] outline-none">
                        <option value="">All</option>
                        {% for dept in departments %}
                        <option value="{{ dept }}">{{ dept }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="ml-auto flex items-center gap-4 text-xs">
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-amber-500"></span>
                        <span class="font-bold text-slate-500">Pending: <span x-text="stats.staging?.Pending || 0"></span></span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                        <span class="font-bold text-slate-500">Approved: <span x-text="stats.staging?.Approved || 0"></span></span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-violet-500"></span>
                        <span class="font-bold text-slate-500">Vector DB: <span x-text="stats.vector_count || 0"></span></span>
                    </div>
                </div>
            </div>

            <!-- Loading / Empty -->
            <div x-show="loading" class="text-center py-12 text-slate-400 text-sm">Loading...</div>
            <div x-show="!loading && chunks.length === 0" class="text-center py-12 text-slate-400 text-sm">No chunks match the current filters.</div>

            <!-- Chunk cards -->
            <div class="space-y-4">
                <template x-for="chunk in chunks" :key="chunk.id">
                    <div class="bg-white rounded-xl border shadow-sm overflow-hidden"
                         :class="chunk.status === 'Pending' ? 'border-amber-200' : chunk.status === 'Approved' ? 'border-emerald-200' : 'border-slate-200'">
                        <div class="px-5 py-3 flex items-center justify-between border-b"
                             :class="chunk.status === 'Pending' ? 'bg-amber-50 border-amber-100' : chunk.status === 'Approved' ? 'bg-emerald-50 border-emerald-100' : 'bg-slate-50 border-slate-100'">
                            <div class="flex items-center gap-3">
                                <span class="w-2 h-2 rounded-full"
                                      :class="chunk.status === 'Pending' ? 'bg-amber-500' : chunk.status === 'Approved' ? 'bg-emerald-500' : 'bg-red-400'"></span>
                                <span class="text-xs font-bold text-slate-500" x-text="'#' + chunk.id"></span>
                                <span class="text-xs text-slate-400 truncate max-w-xs" x-text="chunk.source"></span>
                                <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full"
                                      :class="chunk.status === 'Pending' ? 'bg-amber-100 text-amber-700' : chunk.status === 'Approved' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'"
                                      x-text="chunk.status"></span>
                                <span class="text-[10px] font-medium text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full" x-text="chunk.department"></span>
                            </div>
                            <div class="flex items-center gap-2 text-xs text-slate-400">
                                <span x-show="chunk.auditor" x-text="'by ' + chunk.auditor"></span>
                                <span x-text="chunk.updated_at?.slice(0, 10)"></span>
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="flex gap-4">
                                <div class="flex-1">
                                    <textarea
                                        x-model="chunk._editContent"
                                        class="w-full border border-slate-200 rounded-lg p-3 text-sm font-mono resize-y min-h-[100px] focus:ring-2 focus:ring-[#00A9E0] outline-none"
                                        x-init="chunk._editContent = chunk.content; chunk._editDept = chunk.department; chunk._notes = chunk.auditor_notes || ''"
                                    ></textarea>
                                    <input type="text" x-model="chunk._notes" placeholder="Notes (optional)"
                                        class="w-full mt-2 px-3 py-1.5 border border-slate-200 rounded-lg text-xs focus:ring-2 focus:ring-[#00A9E0] outline-none">
                                </div>
                                <div class="w-40 flex flex-col gap-2">
                                    <select x-model="chunk._editDept"
                                        class="px-2 py-1.5 border border-slate-200 rounded-lg text-xs focus:ring-2 focus:ring-[#00A9E0] outline-none">
                                        {% for dept in departments %}
                                        <option value="{{ dept }}">{{ dept }}</option>
                                        {% endfor %}
                                    </select>
                                    <template x-if="chunk.status === 'Pending'">
                                        <div class="space-y-2">
                                            <button @click="approveChunk(chunk)"
                                                class="w-full py-2 rounded-lg text-xs font-bold bg-emerald-500 text-white hover:bg-emerald-600 transition-all">
                                                Approve
                                            </button>
                                            <button @click="rejectChunk(chunk)"
                                                class="w-full py-2 rounded-lg text-xs font-bold bg-slate-200 text-slate-600 hover:bg-slate-300 transition-all">
                                                Reject
                                            </button>
                                        </div>
                                    </template>
                                    <template x-if="chunk.status !== 'Pending'">
                                        <button @click="saveChunk(chunk)"
                                            class="w-full py-2 rounded-lg text-xs font-bold bg-[#00A9E0] text-white hover:bg-[#0090c0] transition-all">
                                            Save Edits
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <!-- Manage Personas Modal -->
    <div x-show="showManagePersonas" x-cloak
         class="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-6"
         @click.self="showManagePersonas = false">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[80vh] flex flex-col">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                <h2 class="text-lg font-bold text-[#00205B]">Manage Personas</h2>
                <button @click="showManagePersonas = false" class="text-slate-400 hover:text-slate-600">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-3">
                <template x-for="p in personas" :key="p.id">
                    <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl">
                        <div class="flex-1">
                            <p class="text-sm font-bold text-slate-700" x-text="p.name"></p>
                            <p class="text-[10px] text-slate-400" x-text="p.role + ' — ' + p.departments.join(', ')"></p>
                        </div>
                        <button @click="deletePersonaById(p.id)" x-show="p.role !== 'Admin'"
                            class="text-xs text-red-400 hover:text-red-600">Delete</button>
                    </div>
                </template>
            </div>
            <div class="px-6 py-4 border-t border-slate-100 space-y-3">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">Add Persona</p>
                <div class="flex gap-2">
                    <input x-model="newPersona.name" type="text" placeholder="Name" class="flex-1 px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-[#00A9E0]">
                    <input x-model="newPersona.role" type="text" placeholder="Role" class="w-32 px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-[#00A9E0]">
                </div>
                <div class="flex flex-wrap gap-2">
                    {% for dept in departments %}
                    <label class="flex items-center gap-1.5 text-xs">
                        <input type="checkbox" value="{{ dept }}" x-model="newPersona.departments" class="rounded border-slate-300 text-[#00A9E0] focus:ring-[#00A9E0]">
                        {{ dept }}
                    </label>
                    {% endfor %}
                </div>
                <button @click="addPersona()" :disabled="!newPersona.name || !newPersona.role"
                    class="w-full py-2 rounded-lg text-xs font-bold bg-[#00205B] text-white hover:bg-[#001844] disabled:opacity-40 transition-all">
                    Add Persona
                </button>
            </div>
        </div>
    </div>

    <script>
        function auditorApp() {
            return {
                personas: [],
                currentPersona: null,
                showManagePersonas: false,
                chunks: [],
                stats: {},
                loading: false,
                filterStatus: 'Pending',
                filterDept: '',
                newPersona: { name: '', role: 'Auditor', departments: [] },

                async init() {
                    await this.loadPersonas();
                    // Restore last persona from localStorage
                    const savedId = localStorage.getItem('zenbrain_persona_id');
                    if (savedId) {
                        const found = this.personas.find(p => p.id === parseInt(savedId));
                        if (found) {
                            this.currentPersona = found;
                            this.loadChunks();
                            this.loadStats();
                        }
                    }
                },

                async loadPersonas() {
                    try {
                        const resp = await fetch('/zenbrain/api/ikm/personas');
                        this.personas = await resp.json();
                    } catch (e) { console.error(e); }
                },

                selectPersona(p) {
                    this.currentPersona = p;
                    localStorage.setItem('zenbrain_persona_id', p.id);
                    this.filterDept = '';
                    this.loadChunks();
                    this.loadStats();
                },

                switchPersona() {
                    this.currentPersona = null;
                    localStorage.removeItem('zenbrain_persona_id');
                },

                async loadChunks() {
                    if (!this.currentPersona) return;
                    this.loading = true;
                    const params = new URLSearchParams();
                    if (this.filterStatus) params.set('status', this.filterStatus);

                    // Non-admin personas are scoped to their departments
                    if (this.currentPersona.role !== 'Admin') {
                        // Load chunks for each of the persona's departments
                        this.chunks = [];
                        for (const dept of this.currentPersona.departments) {
                            const p = new URLSearchParams(params);
                            p.set('department', dept);
                            try {
                                const resp = await fetch(`/zenbrain/api/ikm/chunks?${p}`);
                                const data = await resp.json();
                                this.chunks.push(...data);
                            } catch (e) {}
                        }
                    } else {
                        if (this.filterDept) params.set('department', this.filterDept);
                        try {
                            const resp = await fetch(`/zenbrain/api/ikm/chunks?${params}`);
                            this.chunks = await resp.json();
                        } catch (e) { console.error(e); }
                    }
                    this.loading = false;
                },

                async loadStats() {
                    try {
                        const resp = await fetch('/zenbrain/api/ikm/stats');
                        this.stats = await resp.json();
                    } catch (e) {}
                },

                async approveChunk(chunk) {
                    await fetch(`/zenbrain/api/ikm/chunks/${chunk.id}/approve`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: chunk._editContent,
                            department: chunk._editDept,
                            auditor: this.currentPersona.name,
                            auditor_notes: chunk._notes,
                        }),
                    });
                    this.loadChunks();
                    this.loadStats();
                },

                async rejectChunk(chunk) {
                    await fetch(`/zenbrain/api/ikm/chunks/${chunk.id}/reject`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            auditor: this.currentPersona.name,
                            auditor_notes: chunk._notes,
                        }),
                    });
                    this.loadChunks();
                    this.loadStats();
                },

                async saveChunk(chunk) {
                    await fetch(`/zenbrain/api/ikm/chunks/${chunk.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: chunk._editContent,
                            department: chunk._editDept,
                            auditor_notes: chunk._notes,
                            auditor: this.currentPersona.name,
                        }),
                    });
                    this.loadChunks();
                    this.loadStats();
                },

                async addPersona() {
                    if (!this.newPersona.name || !this.newPersona.role) return;
                    await fetch('/zenbrain/api/ikm/personas', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.newPersona),
                    });
                    this.newPersona = { name: '', role: 'Auditor', departments: [] };
                    this.loadPersonas();
                },

                async deletePersonaById(id) {
                    if (!confirm('Delete this persona?')) return;
                    await fetch(`/zenbrain/api/ikm/personas/${id}`, { method: 'DELETE' });
                    this.loadPersonas();
                },
            };
        }
    </script>
</body>
</html>
