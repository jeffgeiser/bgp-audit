version: '3.8'

services:
  bgp-audit:
    build: .
    container_name: bgp_audit_app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - IKM_DATA_DIR=/app/data
      - QWEN_API_BASE=http://10.1.0.251:18010/v1
      - QWEN_API_KEY=not-needed
      - QWEN_MODEL=Qwen/Qwen3.5-35B-A3B
    restart: unless-stopped

  # IKM: Web Crawler Service (used by ingestion pipeline)
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: ikm_crawl4ai
    ports:
      - "11235:11235"
    restart: unless-stopped
